<p></p>
<div id="mobile-menu">
  <mat-toolbar color="primary">
    <mat-toolbar-row>
      <img src="assets/logo.png" id="nav-logo" />
      <span class="spacer"></span>
      <button
        mat-icon-button
        style="margin-right: 5%"
        (click)="expandMobileMenu = !expandMobileMenu"
      >
        <mat-icon>menu</mat-icon>
      </button>
    </mat-toolbar-row>
    <mat-toolbar-row *ngIf="expandMobileMenu">
      <button mat-button class="nav-btn" routerLink="/intro">服务介绍</button>
    </mat-toolbar-row>
    <mat-toolbar-row *ngIf="expandMobileMenu">
      <button mat-button class="nav-btn" routerLink="/process">定制流程</button>
    </mat-toolbar-row>
    <mat-toolbar-row *ngIf="expandMobileMenu">
      <button mat-button class="nav-btn" routerLink="/showcase">
        案例展示
      </button>
    </mat-toolbar-row>
    <mat-toolbar-row *ngIf="expandMobileMenu">
      <button mat-button class="nav-btn" routerLink="/about-us">
        关于我们
      </button>
    </mat-toolbar-row>
    <mat-toolbar-row *ngIf="expandMobileMenu">
      <button mat-button class="nav-btn" routerLink="/process">开始定制</button>
    </mat-toolbar-row>
  </mat-toolbar>
</div>
<div id="nav-btns">
  <mat-toolbar color="primary">
    <img src="assets/logo.png" id="nav-logo" />
    <button mat-button class="nav-btn" routerLink="/intro">服务介绍</button>
    <button mat-button class="nav-btn" routerLink="/process">定制流程</button>
    <button mat-button class="nav-btn" routerLink="/showcase">案例展示</button>
    <button mat-button class="nav-btn" routerLink="/about-us">关于我们</button>
    <span class="spacer"></span>
    <button
      mat-button
      style="margin-right: 10%"
      class="nav-btn"
      routerLink="/process"
    >
      开始定制
    </button>
  </mat-toolbar>
</div>
